name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect dependency graph support
        id: depgraph
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: repo } = await github.rest.repos.get(context.repo);
            const status = repo.security_and_analysis?.dependency_graph?.status || 'unknown';
            const enabled = status === 'enabled';
            core.info(`dependency_graph status: ${status}`);
            core.setOutput('enabled', enabled ? 'true' : 'false');

      - name: Dependency review
        if: steps.depgraph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review skipped
        if: steps.depgraph.outputs.enabled != 'true'
        run: echo "Dependency graph is disabled or unavailable for this repository; skipping dependency review check."
