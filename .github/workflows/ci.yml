name: frontend-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Dependency audit (warning-only)
        run: |
          npm audit --audit-level=high || echo "npm audit reported findings (non-blocking)."
