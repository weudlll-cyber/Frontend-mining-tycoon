name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.prettierrc*'
              - 'vite.config.*'
              - 'vitest.config.*'
            backend:
              - 'backend/**'
              - 'api/**'
              - 'server/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'requirements*.txt'
              - 'Pipfile'
              - 'Pipfile.lock'
            any:
              - '**'

  frontend-ci:
    name: Frontend CI (tests/lint/audit/build)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test -- --run

      - name: Coverage tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

  backend-ci:
    name: Backend CI (tests/lint/audit/security)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend checks
        shell: bash
        run: |
          set -euo pipefail

          if [ -f backend/package.json ]; then
            echo "Detected Node backend at backend/."
            pushd backend >/dev/null
            npm ci
            npm run lint
            npm test -- --run
            npm audit --audit-level=high
            if npm run | grep -q "build"; then
              npm run build
            fi
            popd >/dev/null
            exit 0
          fi

          if [ -f backend/pyproject.toml ] || [ -f backend/requirements.txt ]; then
            echo "Detected Python backend at backend/."
            python -m pip install --upgrade pip
            pushd backend >/dev/null

            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi

            if [ -f pyproject.toml ]; then
              pip install .
            fi

            pip install pytest ruff bandit pip-audit
            ruff check .
            pytest -q
            bandit -r . -q
            pip-audit
            popd >/dev/null
            exit 0
          fi

          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "Detected Python backend at repository root."
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi
            pip install pytest ruff bandit pip-audit
            ruff check .
            pytest -q
            bandit -r . -q
            pip-audit
            exit 0
          fi

          echo "Backend changes were detected, but no supported backend project layout was found."
          echo "Expected one of: backend/package.json, backend/pyproject.toml, backend/requirements.txt, pyproject.toml, requirements.txt"
          exit 1

  ci-summary:
    name: CI Summary (Manual Merge Gate)
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - frontend-ci
      - backend-ci
    if: always()
    steps:
      - name: Summarize results
        shell: bash
        run: |
          set -euo pipefail

          FRONTEND_CHANGED="${{ needs.detect-changes.outputs.frontend }}"
          BACKEND_CHANGED="${{ needs.detect-changes.outputs.backend }}"
          FRONTEND_RESULT="${{ needs.frontend-ci.result }}"
          BACKEND_RESULT="${{ needs.backend-ci.result }}"

          echo "## CI Merge Safety Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend changed: ${FRONTEND_CHANGED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend changed: ${BACKEND_CHANGED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend CI result: ${FRONTEND_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend CI result: ${BACKEND_RESULT}" >> "$GITHUB_STEP_SUMMARY"

          SAFE_TO_MERGE="true"

          if [ "$FRONTEND_CHANGED" = "true" ] && [ "$FRONTEND_RESULT" != "success" ]; then
            SAFE_TO_MERGE="false"
          fi

          if [ "$BACKEND_CHANGED" = "true" ] && [ "$BACKEND_RESULT" != "success" ]; then
            SAFE_TO_MERGE="false"
          fi

          if [ "$SAFE_TO_MERGE" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo ":white_check_mark: All required CI checks passed. Safe to merge manually after review." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ":x: One or more required checks failed. Not safe to merge." >> "$GITHUB_STEP_SUMMARY"
          exit 1

  post-results:
    name: Post PR CI Results Comment
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - frontend-ci
      - backend-ci
      - ci-summary
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Create or update PR results comment
        uses: actions/github-script@v7
        env:
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend }}
          FRONTEND_RESULT: ${{ needs.frontend-ci.result }}
          BACKEND_RESULT: ${{ needs.backend-ci.result }}
          SUMMARY_RESULT: ${{ needs.ci-summary.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- ci-results-comment -->';
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.info('No pull_request in context; skipping comment.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const frontendChanged = process.env.FRONTEND_CHANGED === 'true';
            const backendChanged = process.env.BACKEND_CHANGED === 'true';
            const frontendResult = process.env.FRONTEND_RESULT || 'skipped';
            const backendResult = process.env.BACKEND_RESULT || 'skipped';
            const summaryResult = process.env.SUMMARY_RESULT || 'failure';

            const iconFor = (result) => {
              if (result === 'success') return '✅';
              if (result === 'skipped') return '⏭️';
              if (result === 'cancelled') return '⚪';
              return '❌';
            };

            const mergeSafe = summaryResult === 'success';
            const mergeSafetyText = mergeSafe
              ? '✅ **SAFE** to merge manually after review.'
              : '❌ **NOT SAFE** to merge. Resolve failing checks first.';

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const lines = [];
            lines.push(marker);
            lines.push('## CI Test Summary');
            lines.push('');
            lines.push(`- Workflow run: [View run details](${runUrl})`);
            lines.push(`- Commit: \`${context.sha.slice(0, 7)}\``);
            lines.push('');
            lines.push('### Change Detection');
            lines.push(`- Frontend changed: **${frontendChanged ? 'yes' : 'no'}**`);
            lines.push(`- Backend changed: **${backendChanged ? 'yes' : 'no'}**`);
            lines.push('');
            lines.push('### Full CI Result');
            lines.push(`- Overall CI: ${iconFor(summaryResult)} **${summaryResult}**`);
            lines.push('');

            lines.push('### Frontend Test Results');
            if (frontendChanged) {
              lines.push(`- Frontend CI: ${iconFor(frontendResult)} **${frontendResult}**`);
              lines.push('- Includes: unit tests, coverage, lint, format, build, npm audit');
            } else {
              lines.push('- Not applicable (no frontend changes detected).');
            }
            lines.push('');

            lines.push('### Backend Test Results');
            if (backendChanged) {
              lines.push(`- Backend CI: ${iconFor(backendResult)} **${backendResult}**`);
              lines.push('- Includes: tests, lint, audit/security checks for detected backend stack');
            } else {
              lines.push('- Not applicable (no backend changes detected).');
            }
            lines.push('');

            lines.push('### Linting and Formatting');
            lines.push(`- Frontend lint/format: ${frontendChanged ? `${iconFor(frontendResult)} **${frontendResult}**` : '⏭️ skipped (unchanged)'}`);
            lines.push(`- Backend lint: ${backendChanged ? `${iconFor(backendResult)} **${backendResult}**` : '⏭️ skipped (unchanged)'}`);
            lines.push('');

            lines.push('### Audit and Security Checks');
            lines.push(`- Frontend audit: ${frontendChanged ? `${iconFor(frontendResult)} **${frontendResult}**` : '⏭️ skipped (unchanged)'}`);
            lines.push(`- Backend security checks: ${backendChanged ? `${iconFor(backendResult)} **${backendResult}**` : '⏭️ skipped (unchanged)'}`);
            lines.push('');

            lines.push('### Merge Safety');
            lines.push(`- ${mergeSafetyText}`);
            lines.push('- Merge remains manual; no auto-merge is performed by this workflow.');

            const body = lines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.filter(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing.length === 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              core.info('Created CI results comment.');
              return;
            }

            const [keep, ...duplicates] = existing;
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: keep.id,
              body,
            });

            for (const duplicate of duplicates) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: duplicate.id,
              });
            }

            core.info(`Updated CI results comment and removed ${duplicates.length} duplicate(s).`);
