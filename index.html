<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mining Tycoon | Start</title>
  </head>
  <body>
    <main class="lobby-shell">
      <section class="lobby-stage" aria-label="Authentication and lobby">
        <article class="panel auth-panel" aria-label="Authentication panel">
          <h1 class="brand-title">Mining Tycoon</h1>
          <p class="brand-subtitle">
            Sign in first, then choose one of the open games to enter the live
            board.
          </p>

          <form id="login-form" class="auth-form" aria-label="Login form">
            <label class="auth-form-row" for="login-username">
              <span>Username</span>
              <input
                id="login-username"
                name="username"
                type="text"
                autocomplete="username"
                required
              />
            </label>
            <label class="auth-form-row" for="login-password">
              <span>Password</span>
              <input
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
            </label>
            <button
              id="open-forgot-password"
              class="inline-link"
              type="button"
            >
              Forgot password?
            </button>
            <button class="auth-button" type="submit">Sign in</button>
            <div class="auth-helpers">
              <button id="open-register-dialog" class="create-account-btn" type="button">
                Create account
              </button>
              <button id="logout-btn" class="logout-btn" type="button" disabled>
                Logout
              </button>
              <a class="link-button" href="/admin.html">Admin setup</a>
            </div>
          </form>

          <p id="auth-message" class="message" data-kind="info" aria-live="polite"></p>
        </article>

        <article class="panel lobby-panel" aria-label="Open games panel">
          <div class="panel-header">
            <h2>Open Games</h2>
          </div>
          <p id="account-summary" class="message" data-kind="info">Not signed in.</p>
          <ul
            id="open-games-list"
            class="open-games-list"
            aria-label="Open games"
          ></ul>
          <section class="lobby-last-game-panel" aria-label="Last game highscores">
            <h3>Last Game Highscores</h3>
            <p id="last-game-summary" class="message" data-kind="info">
              No finished game recorded yet.
            </p>
            <div id="last-game-highscores" class="lobby-last-game-scores"></div>
          </section>
          <div class="lobby-actions">
            <p id="lobby-message" class="message" data-kind="info" aria-live="polite"></p>
            <button id="join-selected-btn" class="join-btn" type="button" disabled>
              Enter game
            </button>
          </div>
        </article>
      </section>
    </main>

    <dialog id="forgot-password-dialog" aria-label="Forgot password form">
      <form id="forgot-password-form" class="dialog-form" method="dialog">
        <h3>Reset password</h3>
        <label class="auth-form-row" for="forgot-username">
          <span>Username</span>
          <input id="forgot-username" name="username" type="text" required />
        </label>
        <label class="auth-form-row" for="forgot-email">
          <span>Email</span>
          <input id="forgot-email" name="email" type="email" required />
        </label>
        <label class="auth-form-row" for="forgot-new-password">
          <span>New password</span>
          <input
            id="forgot-new-password"
            name="newPassword"
            type="password"
            autocomplete="new-password"
            required
          />
        </label>
        <div class="dialog-actions">
          <button id="cancel-forgot-password" type="button">Cancel</button>
          <button type="submit" class="auth-button">Reset</button>
        </div>
      </form>
    </dialog>

    <dialog id="register-dialog" aria-label="Register account form">
      <form id="register-form" class="dialog-form">
        <h3>Create account</h3>
        <label class="auth-form-row" for="register-username">
          <span>Username</span>
          <input
            id="register-username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />
        </label>
        <label class="auth-form-row" for="register-display-name">
          <span>Display name</span>
          <input
            id="register-display-name"
            name="displayName"
            type="text"
            autocomplete="nickname"
            required
          />
        </label>
        <label class="auth-form-row" for="register-email">
          <span>Email</span>
          <input
            id="register-email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />
        </label>
        <label class="auth-form-row" for="register-discord">
          <span>Discord handle</span>
          <input
            id="register-discord"
            name="discord"
            type="text"
            placeholder="name#1234"
            required
          />
        </label>
        <label class="auth-form-row" for="register-telegram">
          <span>Telegram handle (optional)</span>
          <input
            id="register-telegram"
            name="telegram"
            type="text"
            placeholder="@name"
          />
        </label>
        <label class="auth-form-row" for="register-password">
          <span>Password</span>
          <input
            id="register-password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
          />
          <small class="field-hint">Min. 12 characters &bull; upper &amp; lowercase &bull; digit &bull; special character (e.g. !@#$)</small>
        </label>
        <label class="auth-form-row" for="register-password-confirm">
          <span>Confirm password</span>
          <input
            id="register-password-confirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            required
          />
        </label>
        <p id="register-message" class="message" data-kind="info" aria-live="polite"></p>
        <div class="dialog-actions">
          <button id="cancel-register-dialog" type="button">Cancel</button>
          <button type="submit" class="auth-button">Create account</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/lobby.js"></script>
  </body>
</html>
